# ==================== HYPRLAND KEYBINDINGS ====================
# Keybind prefixes:
#   bind     = standard keybind, triggers once on press
#   bindl    = locked bind, works even when screen is locked
#   bindle   = repeats while held down
#   bindd    = includes description for documentation
#   bindid   = named bind with unique ID
#   bindm    = mouse button bind
#   bindit   = input trap bind, intercepts before processing
#   binditn  = non-consuming input trap
#   bindp    = pass-through bind for special keys

#!

# ==================== GLOBAL SUBMAP ====================
# Enables quickshell keybinds via "global" dispatcher
# Routes keybinds directly to QuickShell for faster response
exec = hyprctl dispatch submap global
submap = global

#!

# ==================== APPS ====================
##! Apps
bind = $mainMod, W, exec, $webBrowser
bind = $mainMod, E, exec, $terminal $fileManager
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, D, exec, $menu

# Misc
bind = $mainMod, Tab, workspace, previous
bind = $mainMod, V, exec, vicinae vicinae://launch/clipboard/history
bind = $mainMod, P, exec, $colorPicker

# Video downloader
bind = $mainMod, Y, exec, [workspace special:ytdl silent] $terminal --title "Video Downloader" -e ~/.config/scripts/utils/video_download_ytlp.sh --headless
bind = $mainMod SHIFT, Y, exec, [workspace special:ytdl silent] $terminal --title "Audio Downloader" -e ~/.config/scripts/utils/video_download_ytlp.sh --headless --audio
bind = $mainMod CTRL, Y, togglespecialworkspace, ytdl

# ==================== QUICK SHELL ====================
##! Quick Shell
# Quickshell-integrated keybinds (use global, quickshell:...)
bindit = ,Super_L, global, quickshell:workspaceNumber # [hidden]
bindid = ,Super_R, Toggle search, global, quickshell:searchToggleRelease # [hidden]
bind = $mainMod, G, global, quickshell:overlayToggle # Toggle overlay
bindd = $mainMod, Slash, Toggle cheatsheet, global, quickshell:cheatsheetToggle # Cheatsheet
bindd = CTRL ALT, Delete, Toggle session menu, global, quickshell:sessionToggle # Session menu
bindd = $mainMod, J, Toggle bar, global, quickshell:barToggle # Toggle bar visibility

#!

# ==================== WINDOW MANAGEMENT ====================
##! Window Management

# Close / Force close
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, killactive, force
bind = $mainMod CTRL SHIFT, M, exit,

# Floating / Pin
bind = $mainMod, F, togglefloating,
bind = $mainMod SHIFT, F, pin,

# Fullscreen (Super+F11) - commented
bind = $mainMod, F11, fullscreen, # Fullscreen toggle with decorations
bind = $mainMod SHIFT, F11, fullscreenstate, toggle
# Fullscreen spoof (Super+Ctrl+F) - hides decorations completely
# bind = $mainMod CTRL, F, fullscreenstate, 0 3

# Focus direction
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move workspace to monitor
bind = $mainMod SHIFT, left, movecurrentworkspacetomonitor, l
bind = $mainMod SHIFT, right, movecurrentworkspacetomonitor, r

# Resize (Ctrl+Alt+Arrow)
bind = $mainMod CTRL, LEFT, resizeactive, -50 0
bind = $mainMod CTRL, RIGHT, resizeactive, 50 0
bind = $mainMod CTRL, UP, resizeactive, 0 -50
bind = $mainMod CTRL, DOWN, resizeactive, 0 50

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#!

# ==================== SCREENSHOTS & RECORDING ====================
##! Screenshots And Recording
# Screen snip (Super+Shift+S)
bind = $mainMod SHIFT, S, exec, qs -c ii ipc call TEST_ALIVE || grim -g "$(slurp)" - | wl-copy

# Color picker
bind = $mainMod SHIFT, C, exec, hyprpicker -a

# Screenshot tools
bind = $mainMod, Print, global, quickshell:regionOcr
bind = , Print, exec, qs -c ii ipc call region screenshot
bind = CTRL ALT, Print, exec, ~/.config/scripts/utils/screenshot.sh
bind = CTRL SHIFT, Print, exec, ~/.config/scripts/utils/screenshot.sh window

# Google Lens (Super+Shift+A) - commented
# bind = $mainMod SHIFT, A, global, quickshell:regionSearch

# Record region (Super+Shift+R) - commented
# bind = $mainMod SHIFT, R, exec, qs -c ii ipc call TEST_ALIVE || ~/.config/quickshell/ii/scripts/videos/record.sh

#!

# ==================== MEDIA ====================
##! Media
# Playerctl
bindl = , XF86AudioNext, exec, playerctl next # [hidden]
bindl = , XF86AudioPause, exec, playerctl play-pause # [hidden]
bindl = , XF86AudioPlay, exec, playerctl play-pause # [hidden]
bindl = , XF86AudioPrev, exec, playerctl previous # [hidden]


# Volume
bindle =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ $volumeStep- # [hidden]
bindle =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ $volumeStep+ -l 1.2 # [hidden]
bindl = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_SINK@ toggle # [hidden]

bind = $mainMod, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_SOURCE@ $volumeStep- || ~/.config/scripts/osd/volume.sh mic-down # [hidden]
bind = $mainMod, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_SOURCE@ $volumeStep+ || ~/.config/scripts/osd/volume.sh mic-up # [hidden]

bindl = $mainMod, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # Toggle microphone mute
bindl = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle # [hidden]

# Volume mixer
bind = CTRL ALT, XF86AudioMute, exec, pavucontrol

# Brightness
bindle=, XF86MonBrightnessUp, exec, qs -c $qsConfig ipc call brightness increment $brightnessStep || ~/.config/scripts/osd/brightness.sh up # [hidden]
bindle=, XF86MonBrightnessDown, exec, qs -c $qsConfig ipc call brightness decrement $brightnessStep || ~/.config/scripts/osd/brightness.sh down # [hidden]

#!

# ==================== SCREEN ====================
##! Screen
# Zoom
# binde = $mainMod, minus, exec, ~/.config/hypr/hyprland/scripts/zoom.sh decrease 0.3
# Zoom in (Super+=) - commented
# binde = $mainMod, equal, exec, ~/.config/hypr/hyprland/scripts/zoom.sh increase 0.3

#!

# ==================== SESSION ====================
##! Session
# Lock (Super+L)
bind = $mainMod, L, exec, loginctl lock-session

# Suspend (Super+Shift+L) - commented
# bind = $mainMod SHIFT, L, exec, systemctl suspend || loginctl suspend

#!

# ==================== WORKSPACE ====================
##! Workspace
# Switch workspace
bind = $mainMod, 1, workspace, 1 # [hidden]
bind = $mainMod, 2, workspace, 2 # [hidden]
bind = $mainMod, 3, workspace, 3 # [hidden]
bind = $mainMod, 4, workspace, 4 # [hidden]
bind = $mainMod, 5, workspace, 5 # [hidden]
bind = $mainMod, 6, workspace, 6 # [hidden]
bind = $mainMod, 7, workspace, 7 # [hidden]
bind = $mainMod, 8, workspace, 8 # [hidden]
bind = $mainMod, 9, workspace, 9 # [hidden]
bind = $mainMod, 0, workspace, 10 # [hidden]

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1 # [hidden]
bind = $mainMod SHIFT, 2, movetoworkspace, 2 # [hidden]
bind = $mainMod SHIFT, 3, movetoworkspace, 3 # [hidden]
bind = $mainMod SHIFT, 4, movetoworkspace, 4 # [hidden]
bind = $mainMod SHIFT, 5, movetoworkspace, 5 # [hidden]
bind = $mainMod SHIFT, 6, movetoworkspace, 6 # [hidden]
bind = $mainMod SHIFT, 7, movetoworkspace, 7 # [hidden]
bind = $mainMod SHIFT, 8, movetoworkspace, 8 # [hidden]
bind = $mainMod SHIFT, 9, movetoworkspace, 9 # [hidden]
bind = $mainMod SHIFT, 0, movetoworkspace, 10 # [hidden]

# Scroll workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# ==================== END ====================
submap = reset
